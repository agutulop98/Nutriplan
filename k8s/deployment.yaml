apiVersion: apps/v1
kind: Deployment
metadata:
  name: nutriplan-backend
  labels:
    app: nutriplan-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nutriplan-backend
  template:
    metadata:
      labels:
        app: nutriplan-backend
    spec:
      containers:
        - name: nutriplan-backend
          image: nutriplan-backend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: "production"
            - name: FRONTEND_URL
              value: "https://tranquil-bienenstitch-a0ca9b.netlify.app"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nutriplan-secret
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nutriplan-secret
                  key: JWT_SECRET
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nutriplan-secret
                  key: OPENAI_API_KEY
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
